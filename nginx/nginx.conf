user nginx;
worker_processes auto;
worker_rlimit_nofile 1024;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
    accept_mutex off;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    '$request_time';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    client_max_body_size 10M;

    # Map for CORS origin handling
    map $http_origin $cors_origin {
        ~^https://(www\.)?svt\.rajivwallace\.com$ $http_origin;
        default "";
    }
    
    upstream svt_frontend { server svt-frontend:80; keepalive 32; }
    upstream svt_backend { server svt-backend:8000; keepalive 32; }

    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=static:10m rate=30r/s;

    gzip on;
    gzip_vary on;
    gzip_comp_level 4;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;

    # 1. FRONTEND SERVER (Handles SPA Routing & Fallbacks)
    server {
        listen 80 default_server;
        server_name svt.rajivwallace.com www.svt.rajivwallace.com localhost;
        root /usr/share/nginx/html;
        index index.html;
        
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;

        location /nginx-status/ {
            stub_status on; access_log off;
            allow 127.0.0.1; allow 172.0.0.0/8; deny all;
        }

        # API Proxy: Explicitly funnel API calls to the backend
        location /api/ {
            proxy_pass http://svt_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # SPA Fallback: Everything else goes to React
        location / {
            try_files $uri $uri/ /index.html;
        }
    }

    # 2. BACKEND API SERVER (Dedicated to Logic, Static & Media)
    server {
        listen 80;
        server_name svt-api.rajivwallace.com svt-nginx;
        
        location /static/ {
            alias /usr/share/nginx/html/static/;
            expires 1y;
            try_files $uri $uri/ =404;
        }

        # API Endpoints
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            
            # CORS restricted to methods supported in views.py
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, X-CSRFToken, X-Requested-With, Authorization" always;
            add_header Access-Control-Allow-Credentials "true" always;

            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin $cors_origin always;
                add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Content-Type, X-CSRFToken, X-Requested-With, Authorization" always;
                add_header Access-Control-Allow-Credentials "true" always;
                return 204;
            }
            
            proxy_pass http://svt_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location /admin/ { proxy_pass http://svt_backend; }
        location /health/ { proxy_pass http://svt_backend/health/; access_log off; }
    }
}